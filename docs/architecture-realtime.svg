<svg viewBox="0 0 720 680" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-or" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D94E0B" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font: 14px/1.6 sans-serif; fill: #1a1a1a }
      .ts { font: 12px/1.5 sans-serif; fill: #5f5e5a }
      .th { font: 500 14px/1.6 sans-serif; fill: #1a1a1a }
      .t9 { font: 9px/1.4 sans-serif; fill: #8a8a84 }
    </style>
  </defs>

  <text class="th" x="360" y="24" text-anchor="middle" font-size="16px">语音解析 — 实时 + 离线双路架构</text>
  <line x1="360" y1="34" x2="360" y2="650" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ============ 实时 (左侧) ============ -->
  <text class="th" x="180" y="54" text-anchor="middle" fill="#993C1D">实时（约 1–3 秒）</text>

  <!-- 音频流 -->
  <g transform="translate(50,68)">
    <rect x="0" y="0" width="110" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="th" x="55" y="20" text-anchor="middle" dominant-baseline="central">音频流</text>
    <text class="ts" x="55" y="34" text-anchor="middle" dominant-baseline="central">WebSocket</text>
  </g>

  <!-- ASR -->
  <line x1="160" y1="88" x2="188" y2="88" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow-r)"/>
  <g transform="translate(188,68)">
    <rect x="0" y="0" width="100" height="40" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
    <text class="th" x="50" y="20" text-anchor="middle" dominant-baseline="central">ASR</text>
    <text class="ts" x="50" y="34" text-anchor="middle" dominant-baseline="central">流式转写 0.5–2s</text>
  </g>

  <!-- LLM -->
  <line x1="238" y1="108" x2="210" y2="108" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow-r)"/>
  <g transform="translate(160,108)">
    <rect x="0" y="0" width="100" height="40" rx="8" fill="#F5ECFA" stroke="#8B4CAB" stroke-width="0.5"/>
    <text class="th" x="50" y="20" text-anchor="middle" dominant-baseline="central">LLM</text>
    <text class="ts" x="50" y="34" text-anchor="middle" dominant-baseline="central">意图提取 0.3s</text>
  </g>

  <!-- 看板 -->
  <line x1="210" y1="148" x2="188" y2="148" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow-r)"/>
  <g transform="translate(138,148)">
    <rect x="0" y="0" width="100" height="40" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text class="th" x="50" y="20" text-anchor="middle" dominant-baseline="central">看板</text>
    <text class="ts" x="50" y="34" text-anchor="middle" dominant-baseline="central">WebSocket 推送</text>
  </g>

  <!-- ============ 离线 (右侧) ============ -->
  <text class="th" x="540" y="54" text-anchor="middle" fill="#185FA5">离线（异步/湖上）</text>

  <!-- 子路径1: 持久化 -->
  <text class="ts" x="540" y="74" text-anchor="middle" fill="#185FA5">▸ 实时结果持久化</text>

  <!-- 分支线 -->
  <line x1="300" y1="82" x2="380" y2="82" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-b)"/>

  <!-- Kafka -->
  <g transform="translate(380,66)">
    <rect x="0" y="0" width="90" height="34" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text class="th" x="45" y="20" text-anchor="middle" dominant-baseline="central">Kafka</text>
  </g>

  <!-- Lance -->
  <g transform="translate(478,66)">
    <rect x="0" y="0" width="90" height="34" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text class="ts" x="45" y="20" text-anchor="middle" dominant-baseline="central">Lance</text>
  </g>

  <!-- Iceberg -->
  <g transform="translate(576,66)">
    <rect x="0" y="0" width="90" height="34" rx="6" fill="#e8e8e8" stroke="#8a8a84" stroke-width="0.5" stroke-dasharray="4,3"/>
    <text class="ts" x="45" y="20" text-anchor="middle" dominant-baseline="central" fill="#8a8a84">Iceberg</text>
  </g>

  <!-- S3 + Gravitino -->
  <g transform="translate(380,106)">
    <rect x="0" y="0" width="140" height="34" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text class="ts" x="70" y="20" text-anchor="middle" dominant-baseline="central">S3 归档</text>
  </g>
  <g transform="translate(528,106)">
    <rect x="0" y="0" width="140" height="34" rx="6" fill="#e8e8e8" stroke="#8a8a84" stroke-width="0.5" stroke-dasharray="4,3"/>
    <text class="ts" x="70" y="20" text-anchor="middle" dominant-baseline="central" fill="#8a8a84">Gravitino 注册</text>
  </g>

  <!-- 计算引擎: Daft 运行在 Ray 上 -->
  <line x1="380" y1="150" x2="570" y2="150" stroke="#D94E0B" stroke-width="0.5"/>
  <text class="ts" x="455" y="164" text-anchor="middle" fill="#D94E0B">▸ 计算引擎</text>

  <!-- Ray (分布式), Daft 运行其上 -->
  <g transform="translate(380,140)">
    <rect x="0" y="0" width="190" height="46" rx="8" fill="#FFF2EB" stroke="#D94E0B" stroke-width="1"/>
    <text class="th" x="120" y="16" text-anchor="middle" dominant-baseline="central" font-size="13px">Ray</text>
    <rect x="8" y="24" width="65" height="18" rx="4" fill="#FFD6C4" stroke="#D94E0B" stroke-width="0.5"/>
    <text class="ts" x="40" y="35" text-anchor="middle" dominant-baseline="central" font-size="10px">Daft</text>
  </g>

  <!-- Ray → Lance -->
  <line x1="500" y1="140" x2="523" y2="100" stroke="#D94E0B" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-or)"/>

  <!-- 子路径2: 湖上多模处理流水线 -->
  <line x1="380" y1="195" x2="620" y2="195" stroke="#b4b2a9" stroke-width="0.5"/>
  <text class="ts" x="540" y="213" text-anchor="middle" fill="#185FA5">▸ 湖上多模数据处理流水线</text>

  <!-- Step 1: S3 → Lance blob v2 -->
  <g transform="translate(380,225)">
    <rect x="0" y="0" width="120" height="48" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <text class="th" x="60" y="18" text-anchor="middle" dominant-baseline="central">① 数据入湖</text>
    <text class="t9" x="60" y="32" text-anchor="middle" dominant-baseline="central">S3 → Lance blob v2</text>
    <text class="t9" x="60" y="42" text-anchor="middle" dominant-baseline="central">ingest · Daft</text>
  </g>
  <line x1="500" y1="249" x2="530" y2="249" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow-b)"/>

  <!-- Step 2: ASR + PII + LLM -->
  <g transform="translate(530,265)">
    <rect x="0" y="0" width="130" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
    <text class="th" x="65" y="16" text-anchor="middle" dominant-baseline="central">② 湖上分析</text>
    <text class="t9" x="65" y="29" text-anchor="middle" dominant-baseline="central">ASR → PII → LLM</text>
    <text class="t9" x="65" y="40" text-anchor="middle" dominant-baseline="central">analyze · Daft</text>
  </g>
  <line x1="580" y1="287" x2="580" y2="301" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow-b)"/>

  <!-- Step 3: Embedding -->
  <g transform="translate(400,301)">
    <rect x="0" y="0" width="130" height="44" rx="8" fill="#EAF3DE" stroke="#0F6E56" stroke-width="1"/>
    <text class="th" x="65" y="16" text-anchor="middle" dominant-baseline="central">③ 向量嵌入</text>
    <text class="t9" x="65" y="29" text-anchor="middle" dominant-baseline="central">128维 RMS+ZCR</text>
    <text class="t9" x="65" y="40" text-anchor="middle" dominant-baseline="central">embed · Lance native</text>
  </g>
  <line x1="465" y1="323" x2="465" y2="375" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow-g)"/>

  <!-- Step 4: Query -->
  <g transform="translate(380,375)">
    <rect x="0" y="0" width="170" height="48" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
    <text class="th" x="85" y="18" text-anchor="middle" dominant-baseline="central">④ 查询检索</text>
    <text class="t9" x="85" y="32" text-anchor="middle" dominant-baseline="central">标量过滤(Daft) + ANN(Lance)</text>
    <text class="t9" x="85" y="43" text-anchor="middle" dominant-baseline="central">query · Daft + Lance</text>
  </g>

  <!-- 数据回写 -->
  <line x1="465" y1="423" x2="465" y2="453" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow-d)"/>
  <g transform="translate(408,453)">
    <rect x="0" y="0" width="115" height="28" rx="6" fill="#f0f0f0" stroke="#5f5e5a" stroke-width="0.5"/>
    <text class="t9" x="57" y="18" text-anchor="middle" dominant-baseline="central">回写 Lance 表</text>
  </g>

  <!-- 离线路设计原则 -->
  <g transform="translate(380,505)">
    <rect x="0" y="0" width="290" height="40" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text class="ts" x="145" y="16" text-anchor="middle" dominant-baseline="central">离线路径与实时完全解耦，异步运行不阻塞</text>
    <text class="ts" x="145" y="32" text-anchor="middle" dominant-baseline="central">embed + query 分布式需等 lance-ray 新版本</text>
  </g>

  <!-- ============ 延迟分解 (左侧底部) ============ -->
  <g transform="translate(40,380)">
    <text class="ts" x="0" y="0">实时路径延迟：</text>
    <text class="ts" x="90" y="0" fill="#993C1D">ASR 0.5–2s</text>
    <text class="ts" x="158" y="0">+ LLM 0.3s</text>
    <text class="ts" x="220" y="0">+ 推送 0.1s</text>
    <text class="ts" x="292" y="0">= <tspan fill="#993C1D" font-weight="600">端到端 1–3s</tspan></text>
  </g>

  <g transform="translate(40,400)">
    <text class="ts" x="0" y="0">离线路径延迟：</text>
    <text class="ts" x="90" y="0" fill="#185FA5">入湖 秒级</text>
    <text class="ts" x="145" y="0">→ 分析 秒级(LLM)</text>
    <text class="ts" x="230" y="0">→ 嵌入 秒级</text>
    <text class="ts" x="295" y="0">= <tspan fill="#185FA5" font-weight="600">分钟级</tspan></text>
  </g>

  <!-- LLM 提供商标注 -->
  <g transform="translate(380,555)">
    <text class="t9" x="0" y="0">🤖 LLM: 实时=WorkBuddy AI ｜ 离线=CodeBuddy CLI / DeepSeek</text>
    <text class="t9" x="0" y="12">🗂️ 存储: Lance(blob v2+向量) + Iceberg(ACID/时间旅行) + S3(MinIO)</text>
  </g>
</svg>
