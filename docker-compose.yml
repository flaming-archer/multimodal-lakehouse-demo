services:
  # ── Real Apache Gravitino Server (Java 11 included in image) ─────────────
  gravitino:
    image: apache/gravitino:1.1.1
    container_name: gravitino-server
    hostname: gravitino
    ports:
      - "8090:8090"
    entrypoint: ["/bin/bash", "-c"]
    command: ["/root/gravitino/bin/gravitino.sh run && tail -f /root/gravitino/logs/gravitino-server.log"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/api/version || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 90s
      retries: 15
    restart: unless-stopped

  # ── MinIO (real S3-compatible object storage) ────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio-s3
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  # ── MinIO Init (create buckets) ──────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/voice-raw --ignore-existing;
      mc mb myminio/voice-analysis --ignore-existing;
      echo 'MinIO buckets created.';
      "
    restart: "no"

  # ── Ray Head Node (real distributed compute) ─────────────────────────────
  ray-head:
    image: rayproject/ray:2.44.1-py312
    container_name: ray-head
    hostname: ray-head
    user: root
    shm_size: 2gb
    ports:
      - "8265:8265"
      - "10001:10001"
    command: ray start --head --port=6379 --dashboard-host=0.0.0.0 --ray-client-server-port=10001 --object-manager-port=8076 --node-manager-port=8077 --disable-usage-stats --block
    environment:
      - RAY_ENABLE_WINDOWS_OR_OSX_CLUSTER=1
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 10
    restart: unless-stopped

  # ── Backend API Service (Python 3.12 with all deps) ──────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lakehouse-backend
    hostname: backend
    ports:
      - "8888:8888"
    depends_on:
      gravitino:
        condition: service_healthy
      minio:
        condition: service_healthy
      ray-head:
        condition: service_healthy
    environment:
      - GRAVITINO_URL=http://gravitino:8090
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - RAY_DASHBOARD_URL=http://ray-head:8265
      - RAY_ADDRESS=ray://ray-head:10001
      - USE_MOCK_SERVICES=false
      - DOCKER_MODE=true
      - USE_REAL_RAY=false
      - PYTHONUTF8=1
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    restart: unless-stopped

volumes:
  minio-data:
